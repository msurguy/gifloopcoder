name: CI

on:
  pull_request:
  push:
    branches-ignore: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w gifloopcoder
      - run: npm test -w gifloopcoder
      - run: npm run typecheck -w playground
      - run: npm run build -w playground
        env:
          BASE_PATH: /gifloopcoder/
      - run: npx playwright install chromium --with-deps
        working-directory: apps/playground
      - run: npm run e2e -w playground
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/playground/playwright-report
          retention-days: 7
